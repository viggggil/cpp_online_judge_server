<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>编辑题面</title>
  <link rel="stylesheet" href="/web/styles.css" />
</head>
<body>
  <div class="container">
    <a id="back-to-problem" class="back-link" href="/">← 返回题目详情</a>
    <div class="card">
      <div class="page-header-row">
        <div>
          <h1 id="page-title">编辑题面</h1>
          <div id="page-subtitle" class="meta">加载中...</div>
        </div>
      </div>

      <div class="admin-tools-grid">
        <section class="list-item admin-tool-card">
          <h2>修改题号</h2>
          <label class="label" for="problem-id-input">新题号</label>
          <input id="problem-id-input" class="input" type="number" min="1" placeholder="请输入新的题号" />
          <div class="actions compact-actions">
            <button id="update-id-btn" class="button" type="button">保存题号</button>
          </div>
        </section>

        <section class="list-item admin-tool-card">
          <h2>修改题目名称</h2>
          <label class="label" for="problem-title-input">题目名称</label>
          <input id="problem-title-input" class="input" type="text" maxlength="128" placeholder="请输入题目名称" />
          <div class="actions compact-actions">
            <button id="update-title-btn" class="button" type="button">保存名称</button>
          </div>
        </section>

        <section class="list-item admin-tool-card admin-tool-danger">
          <h2>删除题目</h2>
          <div class="notice">删除后题面、测试点和相关数据将不可恢复，请谨慎操作。</div>
          <div class="actions compact-actions">
            <button id="delete-problem-btn" class="button danger-button" type="button">删除题目</button>
          </div>
        </section>
      </div>

      <div class="editor-layout">
        <section class="editor-panel">
          <h2>Markdown 源文本</h2>
          <textarea id="statement-editor" class="input code editor-textarea" placeholder="请输入 Markdown 题面内容"></textarea>
        </section>

        <section class="editor-panel">
          <h2>实时预览</h2>
          <div id="statement-preview" class="statement preview-panel"></div>
        </section>
      </div>

      <div class="actions">
        <button id="save-btn" class="button" type="button">保存</button>
        <button id="cancel-btn" class="button auth-btn-secondary" type="button">取消</button>
      </div>

      <pre id="status-message" class="notice status-message"></pre>
    </div>
  </div>
  <script src="/web/auth.js"></script>
  <script src="/web/markdown.js"></script>
  <script src="/web/admin-problem-edit.js"></script>
</body>
</html>
