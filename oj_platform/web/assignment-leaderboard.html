<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>作业排行榜</title>
  <link rel="stylesheet" href="/web/styles.css" />
</head>
<body>
  <div class="container">
    <header class="site-header">
      <div class="page-header-row">
        <div>
          <h1 id="leaderboard-title">作业排行榜</h1>
          <p>按过题数优先、总罚时次之排序</p>
        </div>
        <nav class="top-nav top-nav-primary">
          <a class="button nav-button nav-button-inactive" href="/">首页</a>
          <a class="button nav-button nav-button-inactive" href="/problems">题库</a>
          <a class="button nav-button nav-button-active" href="/assignments">作业</a>
          <a class="button nav-button nav-button-inactive nav-submissions" href="/submissions">提交</a>
          <a class="button nav-button nav-button-inactive nav-create" href="/web/admin-problem-create.html">创建</a>
          <a class="button nav-button nav-button-inactive nav-monitor" href="/monitor">监控</a>
        </nav>
      </div>
    </header>
    <a id="back-to-assignment-link" class="back-link" href="/assignments">← 返回作业详情</a>
    <div class="card">
      <div class="page-header-row">
        <div id="leaderboard-meta" class="meta">加载中...</div>
        <button id="reload-leaderboard-btn" class="button auth-btn-secondary" type="button">刷新排行榜</button>
      </div>
      <section class="assignment-section">
        <h2>排行榜</h2>
        <p id="assignment-leaderboard-summary" class="leaderboard-summary">加载中...</p>
        <div id="assignment-leaderboard" class="leaderboard-shell"></div>
      </section>
    </div>
  </div>
  <script src="/web/auth.js"></script>
  <script src="/web/nav.js"></script>
  <script src="/web/assignment-leaderboard.js"></script>
</body>
</html>
