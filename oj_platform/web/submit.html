<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>提交代码</title>
  <link rel="stylesheet" href="/web/styles.css" />
</head>
<body>
  <div class="container">
    <header class="site-header">
      <div class="page-header-row">
        <div>
          <h1>提交代码</h1>
          <p>选择题目并提交源码</p>
        </div>
        <nav class="top-nav top-nav-primary">
          <a class="button nav-button nav-button-inactive" href="/">首页</a>
          <a class="button nav-button nav-button-inactive" href="/problems">题库</a>
          <a class="button nav-button nav-button-inactive" href="/assignments">作业</a>
          <a class="button nav-button nav-button-active nav-submissions" href="/submissions">提交</a>
          <a class="button nav-button nav-button-inactive nav-create" href="/web/admin-problem-create.html">创建</a>
        </nav>
      </div>
    </header>
    <div class="card">
      <div id="problem-info" class="meta"></div>
      <label class="label" for="language">语言</label>
      <select id="language" class="input">
        <option value="cpp">C++17</option>
      </select>
      <label class="label" for="source_code">代码</label>
      <textarea id="source_code" class="code" spellcheck="false">#include <iostream>
using namespace std;

int main() {
    long long a, b;
    cin >> a >> b;
    cout << a + b << "\n";
    return 0;
}
</textarea>
      <div class="actions">
        <button id="submit-btn" class="button">提交评测</button>
      </div>
      <pre id="submit-message" class="notice"></pre>
    </div>
  </div>
  <script src="/web/auth.js"></script>
  <script src="/web/nav.js"></script>
  <script src="/web/submit.js"></script>
</body>
</html>
