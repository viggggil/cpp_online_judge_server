<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OJ Agent</title>
  <link rel="stylesheet" href="/web/styles.css" />
</head>
<body>
  <div class="container">
    <header class="site-header">
      <div class="page-header-row">
        <div>
          <h1>Agent</h1>
          <p>选择一次自己的提交，向 AI 辅导助手提问</p>
        </div>
        <nav class="top-nav top-nav-primary">
          <a class="button nav-button nav-button-inactive" href="/">首页</a>
          <a class="button nav-button nav-button-inactive" href="/problems">题库</a>
          <a class="button nav-button nav-button-inactive" href="/assignments">作业</a>
          <a class="button nav-button nav-button-inactive nav-submissions" href="/submissions">提交</a>
          <a class="button nav-button nav-button-active nav-agent" href="/agent">agent</a>
          <a class="button nav-button nav-button-inactive nav-create" href="/web/admin-problem-create.html">创建</a>
          <a class="button nav-button nav-button-inactive nav-monitor" href="/monitor">监控</a>
        </nav>
      </div>
    </header>

    <main class="agent-chat-page">
      <section class="card agent-chat-shell">
        <div class="agent-chat-topbar">
          <div id="agent-submission-picker" class="agent-mode-picker agent-chat-picker agent-mode-active">
            <label class="label" for="agent-submission-select">选择提交创建新对话</label>
            <select id="agent-submission-select" class="input"></select>
          </div>

          <div id="agent-conversation-picker" class="agent-mode-picker agent-chat-picker">
            <label class="label" for="agent-conversation-select">历史会话</label>
            <div class="agent-picker-row">
              <select id="agent-conversation-select" class="input"></select>
              <button id="agent-load-conversation-btn" class="button secondary" type="button">查看</button>
            </div>
          </div>
        </div>

        <div id="agent-chat-messages" class="agent-chat-messages"></div>

        <div class="agent-composer">
          <select id="agent-hint-level" class="input agent-hint-select" aria-label="提示等级">
            <option value="1">Level 1</option>
            <option value="2" selected>Level 2</option>
            <option value="3">Level 3</option>
          </select>
          <textarea id="agent-question-input" class="input agent-question-input" rows="1" placeholder="询问这次提交的问题..."></textarea>
          <button id="agent-submit-btn" class="button" type="button">发送</button>
        </div>
      </section>
    </main>
  </div>

  <script src="/web/auth.js"></script>
  <script src="/web/nav.js"></script>
  <script src="/web/agent.js"></script>
</body>
</html>
