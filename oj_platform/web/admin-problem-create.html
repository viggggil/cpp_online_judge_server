<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>创建题目</title>
  <link rel="stylesheet" href="/web/styles.css" />
</head>
<body>
  <div class="container">
    <header class="site-header">
      <div class="page-header-row">
        <div>
          <h1>创建题目</h1>
          <div id="page-subtitle" class="meta">加载中...</div>
        </div>
        <nav class="top-nav top-nav-primary">
          <a class="button nav-button nav-button-inactive" href="/">首页</a>
          <a class="button nav-button nav-button-inactive" href="/problems">题库</a>
          <a class="button nav-button nav-button-inactive nav-submissions" href="/submissions">提交</a>
          <a class="button nav-button nav-button-active nav-create" href="/web/admin-problem-create.html">创建</a>
        </nav>
      </div>
    </header>
    <div class="card">
      <div id="permission-notice" class="notice hidden"></div>

      <div class="admin-tools-grid">
        <section class="list-item admin-create-card">
          <h2>导入题目包</h2>
          <p class="admin-create-note">
            上传 ZIP 题目包，直接导入完整题目与测试数据。导入成功后仍可进入编辑页继续维护题面、题号、标题和时空限制。
          </p>
          <label class="label" for="problem-package-input">题目包 ZIP 文件</label>
          <input id="problem-package-input" class="input" type="file" accept=".zip,application/zip" />
          <div class="actions compact-actions">
            <button id="import-problem-btn" class="button" type="button">导入题目包</button>
          </div>
        </section>
        <section class="list-item admin-create-card">
          <h2>手动创建空题目</h2>
          <p class="admin-create-note">
            填写题号、题目名称、题面 Markdown 与时空限制，创建一个暂不带样例和测试数据的新题目。后续可在编辑页追加测试数据文件。
          </p>
        </section>
      </div>

      <div class="admin-tools-grid">
        <section class="list-item admin-tool-card">
          <h2>题号</h2>
          <label class="label" for="problem-id-input">题号</label>
          <input id="problem-id-input" class="input" type="number" min="1" placeholder="请输入题号，例如 1000" />
        </section>

        <section class="list-item admin-tool-card">
          <h2>题目名称</h2>
          <label class="label" for="problem-title-input">题目名称</label>
          <input id="problem-title-input" class="input" type="text" maxlength="128" placeholder="请输入题目名称" />
        </section>

        <section class="list-item admin-tool-card">
          <h2>时空限制</h2>
          <label class="label" for="problem-time-limit-input">时间限制（毫秒）</label>
          <input id="problem-time-limit-input" class="input" type="number" min="1" max="60000" placeholder="请输入时间限制，例如 1000" />
          <label class="label" for="problem-memory-limit-input">空间限制（MB）</label>
          <input id="problem-memory-limit-input" class="input" type="number" min="1" max="4096" placeholder="请输入空间限制，例如 256" />
        </section>
      </div>

      <div class="editor-layout">
        <section class="editor-panel">
          <h2>Markdown 源文本</h2>
          <textarea id="statement-editor" class="input code editor-textarea" placeholder="请输入 Markdown 题面内容"></textarea>
        </section>

        <section class="editor-panel">
          <h2>实时预览</h2>
          <div id="statement-preview" class="statement preview-panel"></div>
        </section>
      </div>

      <div class="actions">
        <button id="create-problem-btn" class="button" type="button">创建空题目</button>
        <button id="reset-form-btn" class="button auth-btn-secondary" type="button">清空表单</button>
      </div>

      <div id="manual-result" class="list-item admin-create-result hidden"></div>
      <div id="import-result" class="list-item admin-create-result hidden"></div>
      <pre id="status-message" class="notice status-message"></pre>
    </div>
  </div>
  <script src="/web/auth.js"></script>
  <script src="/web/markdown.js"></script>
  <script src="/web/admin-problem-create.js"></script>
</body>
</html>
