services:
  mysql:
    image: mysql:8.4
    container_name: oj_platform_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: oj_platform
      MYSQL_USER: oj
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  redis:
    image: redis:7.2-alpine
    container_name: oj_platform_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
  minio:
    image: minio/minio:latest
    container_name: oj_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  oj_server:
    build:
      context: ..
      dockerfile: oj_platform/Dockerfile
      target: oj_server
    container_name: oj_platform_oj_server
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      go_monitor:
        condition: service_started
    environment:
      TZ: Asia/Shanghai
      OJ_SERVER_PORT: 18080
      OJ_MYSQL_HOST: mysql
      OJ_MYSQL_PORT: 3306
      OJ_MYSQL_USER: oj
      OJ_MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      OJ_MYSQL_DATABASE: oj_platform
      OJ_REDIS_HOST: redis
      OJ_REDIS_PORT: 6379
      OJ_ADMIN_REGISTER_CODE: ${OJ_ADMIN_REGISTER_CODE}
      OJ_MONITOR_HOST: go_monitor
      OJ_MONITOR_PORT: 18090
      OJ_OBJECT_STORAGE_ENDPOINT: http://minio:9000
      OJ_OBJECT_STORAGE_ACCESS_KEY: ${MINIO_ROOT_USER}
      OJ_OBJECT_STORAGE_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      OJ_OBJECT_STORAGE_BUCKET: oj-testdata
    ports:
      - "8080:18080"

  judge_dispatcher:
    build:
      context: ..
      dockerfile: oj_platform/Dockerfile
      target: judge_dispatcher
    container_name: oj_platform_judge_dispatcher
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      judge_worker_1:
        condition: service_started
      judge_worker_2:
        condition: service_started
      judge_worker_3:
        condition: service_started
    environment:
      TZ: Asia/Shanghai
      OJ_MYSQL_HOST: mysql
      OJ_MYSQL_PORT: 3306
      OJ_MYSQL_USER: oj
      OJ_MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      OJ_MYSQL_DATABASE: oj_platform
      OJ_REDIS_HOST: redis
      OJ_REDIS_PORT: 6379
      OJ_JUDGE_WORKER_1: judge_worker_1:18081/api/judge
      OJ_JUDGE_WORKER_2: judge_worker_2:18081/api/judge
      OJ_JUDGE_WORKER_3: judge_worker_3:18081/api/judge
      OJ_OBJECT_STORAGE_ENDPOINT: http://minio:9000
      OJ_OBJECT_STORAGE_ACCESS_KEY: ${MINIO_ROOT_USER}
      OJ_OBJECT_STORAGE_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      OJ_OBJECT_STORAGE_BUCKET: oj-testdata

  judge_worker_1:
    build:
      context: ..
      dockerfile: oj_platform/Dockerfile
      target: judge_worker
    container_name: oj_platform_judge_worker_1
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      OJ_JUDGE_WORKER_PORT: 18081
      OJ_OBJECT_STORAGE_ENDPOINT: http://minio:9000
      OJ_OBJECT_STORAGE_ACCESS_KEY: ${MINIO_ROOT_USER}
      OJ_OBJECT_STORAGE_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      OJ_OBJECT_STORAGE_BUCKET: oj-testdata

  judge_worker_2:
    build:
      context: ..
      dockerfile: oj_platform/Dockerfile
      target: judge_worker
    container_name: oj_platform_judge_worker_2
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      OJ_JUDGE_WORKER_PORT: 18081
      OJ_OBJECT_STORAGE_ENDPOINT: http://minio:9000
      OJ_OBJECT_STORAGE_ACCESS_KEY: ${MINIO_ROOT_USER}
      OJ_OBJECT_STORAGE_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      OJ_OBJECT_STORAGE_BUCKET: oj-testdata

  judge_worker_3:
    build:
      context: ..
      dockerfile: oj_platform/Dockerfile
      target: judge_worker
    container_name: oj_platform_judge_worker_3
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      OJ_JUDGE_WORKER_PORT: 18081
      OJ_OBJECT_STORAGE_ENDPOINT: http://minio:9000
      OJ_OBJECT_STORAGE_ACCESS_KEY: ${MINIO_ROOT_USER}
      OJ_OBJECT_STORAGE_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      OJ_OBJECT_STORAGE_BUCKET: oj-testdata
  go_monitor:
    build:
      context: ./services/go_monitor
      dockerfile: Dockerfile
    container_name: oj_platform_go_monitor
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      GO_MONITOR_PORT: 18090
      OJ_MYSQL_HOST: mysql
      OJ_MYSQL_PORT: 3306
      OJ_MYSQL_USER: oj
      OJ_MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      OJ_MYSQL_DATABASE: oj_platform
      OJ_REDIS_HOST: redis
      OJ_REDIS_PORT: 6379
      OJ_REDIS_PASSWORD: ""
      OJ_REDIS_DB: 0
      OJ_REDIS_QUEUE: oj:queue:submissions
      OJ_REDIS_QUEUE_SAMPLE_LIMIT: 50
      OJ_MINIO_HEALTH_URL: http://minio:9000/minio/health/live
      OJ_JUDGE_WORKER_HEALTH_1: http://judge_worker_1:18081/api/health
      OJ_JUDGE_WORKER_HEALTH_2: http://judge_worker_2:18081/api/health
      OJ_JUDGE_WORKER_HEALTH_3: http://judge_worker_3:18081/api/health
    ports:
      - "18090:18090"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      judge_worker_1:
        condition: service_started
      judge_worker_2:
        condition: service_started
      judge_worker_3:
        condition: service_started



volumes:
  mysql_data:
  redis_data:
  minio_data:
