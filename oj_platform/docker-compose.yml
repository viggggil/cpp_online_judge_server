services:
  mysql:
    image: mysql:8.4
    container_name: oj_platform_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: oj_platform
      MYSQL_USER: oj
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  redis:
    image: redis:7.2-alpine
    container_name: oj_platform_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: oj_platform_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: oj
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-oj_pass}
      RABBITMQ_DEFAULT_VHOST: /
      TZ: Asia/Shanghai
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
  minio:
    image: minio/minio:latest
    container_name: oj_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  oj_server:
    build:
      context: ..
      dockerfile: oj_platform/Dockerfile
      target: oj_server
    container_name: oj_platform_oj_server
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_started
      go_monitor:
        condition: service_started
      agent-service:
        condition: service_healthy
    environment:
      TZ: Asia/Shanghai
      OJ_SERVER_PORT: 18080
      OJ_MYSQL_HOST: mysql
      OJ_MYSQL_PORT: 3306
      OJ_MYSQL_USER: oj
      OJ_MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      OJ_MYSQL_DATABASE: oj_platform
      OJ_REDIS_HOST: redis
      OJ_REDIS_PORT: 6379
      OJ_RABBITMQ_HOST: rabbitmq
      OJ_RABBITMQ_PORT: 5672
      OJ_RABBITMQ_USER: oj
      OJ_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-oj_pass}
      OJ_RABBITMQ_VHOST: /
      OJ_RABBITMQ_JUDGE_EXCHANGE: oj.judge.exchange
      OJ_RABBITMQ_JUDGE_QUEUE: oj.judge.q
      OJ_RABBITMQ_JUDGE_ROUTING_KEY: judge.submit
      OJ_ADMIN_REGISTER_CODE: ${OJ_ADMIN_REGISTER_CODE}
      OJ_MONITOR_HOST: go_monitor
      OJ_MONITOR_PORT: 18090
      OJ_AGENT_BASE_URL: http://agent-service:8001
      OJ_INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN}
      OJ_AGENT_READ_TIMEOUT_MS: ${OJ_AGENT_READ_TIMEOUT_MS:-180000}
      OJ_OBJECT_STORAGE_ENDPOINT: http://minio:9000
      OJ_OBJECT_STORAGE_ACCESS_KEY: ${MINIO_ROOT_USER}
      OJ_OBJECT_STORAGE_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      OJ_OBJECT_STORAGE_BUCKET: oj-testdata
    ports:
      - "8080:18080"

  agent-service:
    build:
      context: ..
      dockerfile: oj_platform/Dockerfile
      target: agent_service
      args:
        AGENT_PYTHON_IMAGE: ${AGENT_PYTHON_IMAGE:-python:3.11-slim}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-}
        PIP_DEFAULT_TIMEOUT: ${PIP_DEFAULT_TIMEOUT:-600}
        PIP_RETRIES: ${PIP_RETRIES:-5}
    container_name: oj_platform_agent_service
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      APP_ENV: production
      APP_HOST: 0.0.0.0
      APP_PORT: 8001
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN}
      OJ_SERVER_BASE_URL: http://oj_server:18080
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      CHAT_MODEL: ${CHAT_MODEL:-deepseek/deepseek-v4-flash}
      OPENROUTER_BASE_URL: https://openrouter.ai/api/v1
      OPENROUTER_READ_TIMEOUT_SECONDS: ${OPENROUTER_READ_TIMEOUT_SECONDS:-180}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-BAAI/bge-small-zh-v1.5}
      EMBEDDING_CACHE_DIR: /app/data/fastembed
      CHROMA_PERSIST_DIR: /app/data/chroma
      CHROMA_COLLECTION: oj_agent_knowledge
      HF_ENDPOINT: ${HF_ENDPOINT:-https://hf-mirror.com}
    volumes:
      - ./agent-service/data:/app/data
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=2).read()\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  judge_dispatcher:
    build:
      context: ..
      dockerfile: oj_platform/Dockerfile
      target: judge_dispatcher
    container_name: oj_platform_judge_dispatcher
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_started
      judge_worker_1:
        condition: service_started
      judge_worker_2:
        condition: service_started
      judge_worker_3:
        condition: service_started
    environment:
      TZ: Asia/Shanghai
      OJ_MYSQL_HOST: mysql
      OJ_MYSQL_PORT: 3306
      OJ_MYSQL_USER: oj
      OJ_MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      OJ_MYSQL_DATABASE: oj_platform
      OJ_REDIS_HOST: redis
      OJ_REDIS_PORT: 6379
      OJ_RABBITMQ_HOST: rabbitmq
      OJ_RABBITMQ_PORT: 5672
      OJ_RABBITMQ_USER: oj
      OJ_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-oj_pass}
      OJ_RABBITMQ_VHOST: /
      OJ_RABBITMQ_JUDGE_EXCHANGE: oj.judge.exchange
      OJ_RABBITMQ_JUDGE_QUEUE: oj.judge.q
      OJ_RABBITMQ_JUDGE_ROUTING_KEY: judge.submit
      OJ_RABBITMQ_PREFETCH: 8
      OJ_JUDGE_WORKER_1: judge_worker_1:18081/api/judge
      OJ_JUDGE_WORKER_2: judge_worker_2:18081/api/judge
      OJ_JUDGE_WORKER_3: judge_worker_3:18081/api/judge
      OJ_OBJECT_STORAGE_ENDPOINT: http://minio:9000
      OJ_OBJECT_STORAGE_ACCESS_KEY: ${MINIO_ROOT_USER}
      OJ_OBJECT_STORAGE_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      OJ_OBJECT_STORAGE_BUCKET: oj-testdata

  judge_worker_1:
    build:
      context: ..
      dockerfile: oj_platform/Dockerfile
      target: judge_worker
    container_name: oj_platform_judge_worker_1
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      OJ_JUDGE_WORKER_PORT: 18081
      OJ_OBJECT_STORAGE_ENDPOINT: http://minio:9000
      OJ_OBJECT_STORAGE_ACCESS_KEY: ${MINIO_ROOT_USER}
      OJ_OBJECT_STORAGE_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      OJ_OBJECT_STORAGE_BUCKET: oj-testdata

  judge_worker_2:
    build:
      context: ..
      dockerfile: oj_platform/Dockerfile
      target: judge_worker
    container_name: oj_platform_judge_worker_2
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      OJ_JUDGE_WORKER_PORT: 18081
      OJ_OBJECT_STORAGE_ENDPOINT: http://minio:9000
      OJ_OBJECT_STORAGE_ACCESS_KEY: ${MINIO_ROOT_USER}
      OJ_OBJECT_STORAGE_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      OJ_OBJECT_STORAGE_BUCKET: oj-testdata

  judge_worker_3:
    build:
      context: ..
      dockerfile: oj_platform/Dockerfile
      target: judge_worker
    container_name: oj_platform_judge_worker_3
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      OJ_JUDGE_WORKER_PORT: 18081
      OJ_OBJECT_STORAGE_ENDPOINT: http://minio:9000
      OJ_OBJECT_STORAGE_ACCESS_KEY: ${MINIO_ROOT_USER}
      OJ_OBJECT_STORAGE_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      OJ_OBJECT_STORAGE_BUCKET: oj-testdata
  go_monitor:
    build:
      context: ./services/go_monitor
      dockerfile: Dockerfile
    container_name: oj_platform_go_monitor
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      GO_MONITOR_PORT: 18090
      OJ_MYSQL_HOST: mysql
      OJ_MYSQL_PORT: 3306
      OJ_MYSQL_USER: oj
      OJ_MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      OJ_MYSQL_DATABASE: oj_platform
      OJ_REDIS_HOST: redis
      OJ_REDIS_PORT: 6379
      OJ_REDIS_PASSWORD: ""
      OJ_REDIS_DB: 0
      OJ_REDIS_QUEUE: oj:queue:submissions
      OJ_REDIS_QUEUE_SAMPLE_LIMIT: 50
      OJ_RABBITMQ_API_URL: http://rabbitmq:15672/api/overview
      OJ_RABBITMQ_USER: oj
      OJ_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-oj_pass}
      OJ_MINIO_HEALTH_URL: http://minio:9000/minio/health/live
      OJ_AGENT_READY_URL: http://agent-service:8001/ready
      OJ_JUDGE_WORKER_HEALTH_1: http://judge_worker_1:18081/api/health
      OJ_JUDGE_WORKER_HEALTH_2: http://judge_worker_2:18081/api/health
      OJ_JUDGE_WORKER_HEALTH_3: http://judge_worker_3:18081/api/health
    ports:
      - "18090:18090"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      judge_worker_1:
        condition: service_started
      judge_worker_2:
        condition: service_started
      judge_worker_3:
        condition: service_started



volumes:
  mysql_data:
  redis_data:
  minio_data:
