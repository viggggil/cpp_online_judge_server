version: "3.9"

services:
  mysql:
    image: mysql:8.4
    container_name: oj_platform_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: oj_platform
      MYSQL_USER: oj
      MYSQL_PASSWORD: oj123456
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -proot123456 --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  redis:
    image: redis:7.2-alpine
    container_name: oj_platform_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12

  oj_server:
    build:
      context: .
      dockerfile: Dockerfile
      target: oj_server
    container_name: oj_platform_oj_server
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      TZ: Asia/Shanghai
      OJ_SERVER_PORT: 18080
      OJ_MYSQL_HOST: mysql
      OJ_MYSQL_PORT: 3306
      OJ_MYSQL_USER: oj
      OJ_MYSQL_PASSWORD: oj123456
      OJ_MYSQL_DATABASE: oj_platform
      OJ_REDIS_HOST: redis
      OJ_REDIS_PORT: 6379
    ports:
      - "8080:18080"

  judge_dispatcher:
    build:
      context: .
      dockerfile: Dockerfile
      target: judge_dispatcher
    container_name: oj_platform_judge_dispatcher
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      judge_worker_1:
        condition: service_started
      judge_worker_2:
        condition: service_started
      judge_worker_3:
        condition: service_started
    environment:
      TZ: Asia/Shanghai
      OJ_MYSQL_HOST: mysql
      OJ_MYSQL_PORT: 3306
      OJ_MYSQL_USER: oj
      OJ_MYSQL_PASSWORD: oj123456
      OJ_MYSQL_DATABASE: oj_platform
      OJ_REDIS_HOST: redis
      OJ_REDIS_PORT: 6379
      OJ_JUDGE_WORKER_1: judge_worker_1:18081/api/judge
      OJ_JUDGE_WORKER_2: judge_worker_2:18081/api/judge
      OJ_JUDGE_WORKER_3: judge_worker_3:18081/api/judge

  judge_worker_1:
    build:
      context: .
      dockerfile: Dockerfile
      target: judge_worker
    container_name: oj_platform_judge_worker_1
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      OJ_JUDGE_WORKER_PORT: 18081

  judge_worker_2:
    build:
      context: .
      dockerfile: Dockerfile
      target: judge_worker
    container_name: oj_platform_judge_worker_2
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      OJ_JUDGE_WORKER_PORT: 18081

  judge_worker_3:
    build:
      context: .
      dockerfile: Dockerfile
      target: judge_worker
    container_name: oj_platform_judge_worker_3
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      OJ_JUDGE_WORKER_PORT: 18081

volumes:
  mysql_data:
  redis_data:
